services:
  db: 
    image: postgres:latest
    container_name: criptographyCracker_db
    env_file:
      - ./.env
    volumes:
      - cracker_db:/var/lib/postgresql/data
      - .config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bruteforce"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cracker_db: